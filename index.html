<script>

const URL = "https://glieqeycqkuseykmvcim.supabase.co/rest/v1/registros";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsaWVxZXljcWt1c2V5a212Y2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MzI4MjIsImV4cCI6MjA3NjMwODgyMn0.Ww-q6Iay68YHhuKJbg--FhsxjI_WkjghFFRaC2sgogU";

let tabla;
let dataGlobal = [];
let dataOriginal = [];

// FORMATO FECHA
function formatearFecha(fechaISO){
    if(!fechaISO) return "";
    let f = new Date(fechaISO);
    return f.toLocaleString("es-MX");
}

// 🔥 CARGAR DATOS (CORREGIDO)
async function cargar(){

try{

let todos = [];
let desde = 0;
let limite = 1000;
let maxIteraciones = 50; // 👈 evita loop infinito

for(let i=0; i<maxIteraciones; i++){

let res = await fetch(`${URL}?select=*&offset=${desde}&limit=${limite}`, {
    headers:{
        apikey:API_KEY,
        Authorization:"Bearer "+API_KEY
    }
});

// 🔴 validar respuesta
if(!res.ok){
    console.error("Error HTTP:", res.status);
    break;
}

let data = await res.json();

// 🔴 validar que sea array
if(!Array.isArray(data)){
    console.error("Respuesta inválida:", data);
    break;
}

if(data.length === 0) break;

todos = todos.concat(data);

desde += limite;

}

// 🔴 SI NO HAY DATOS
if(todos.length === 0){
    alert("No se pudieron cargar datos (revisa API KEY o Supabase)");
    return;
}

// guardar original
dataOriginal = todos;

// formatear
dataGlobal = todos.map(x => ({
    ...x,
    fecha_mx: formatearFecha(x.fecha)
}));

llenarFiltroEquipos();
cargarTabla(dataGlobal);
actualizarDashboard(dataGlobal);

}catch(e){
console.error("Error general:", e);
alert("Error cargando datos");
}

}

// TABLA
function cargarTabla(data){

if(tabla) tabla.destroy();

if(data.length === 0) return;

let columnas = Object.keys(data[0]);

tabla = $('#tabla').DataTable({
    data: data.map(x=>columnas.map(c=>x[c])),
    columns: columnas.map(c=>({title:c})),
    pageLength:25
});

}

// FILTRO EQUIPOS
function llenarFiltroEquipos(){

let select = document.getElementById("deviceFilter");
let actual = select.value;

select.innerHTML = '<option value="">Todos</option>';

let devices = [...new Set(dataOriginal.map(x=>x.device_id).filter(x=>x))];

devices.forEach(d=>{
    let opt = document.createElement("option");
    opt.value=d;
    opt.text=d;
    if(d === actual) opt.selected = true;
    select.appendChild(opt);
});

}

// DASHBOARD
function actualizarDashboard(data){

document.getElementById("total").innerText = data.length;

let suma = data.reduce((acc,x)=>acc + (parseFloat(x.cantidad)||0),0);
document.getElementById("suma").innerText = suma;

}

// FILTRAR
function filtrar(){

let inicio = document.getElementById("inicio").value;
let fin = document.getElementById("fin").value;
let device = document.getElementById("deviceFilter").value;

let filtrados = dataOriginal.filter(x=>{

let fecha = new Date(x.fecha);

if(device && x.device_id !== device) return false;

if(inicio && fecha < new Date(inicio)) return false;
if(fin && fecha > new Date(fin + "T23:59:59")) return false;

return true;

});

dataGlobal = filtrados.map(x=>({
    ...x,
    fecha_mx: formatearFecha(x.fecha)
}));

cargarTabla(dataGlobal);
actualizarDashboard(dataGlobal);

}

// BUSCAR
document.getElementById("buscar").addEventListener("keyup",function(){
if(tabla) tabla.search(this.value).draw();
});

// EXCEL (VERSIÓN ESTABLE)
function exportExcel(){

if(!dataGlobal.length){
alert("No hay datos");
return;
}

// 🔥 protección para archivos grandes
if(dataGlobal.length > 15000){
alert("Demasiados registros, filtra antes de exportar");
return;
}

let columnas = Object.keys(dataGlobal[0]);

let filas = dataGlobal.map(x => 
    columnas.map(c => {
        let val = x[c];
        if(val === null || val === undefined) return "";
        return String(val);
    })
);

let ws = XLSX.utils.aoa_to_sheet([columnas, ...filas]);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Datos");

// 🔥 ESTE ES EL QUE SÍ FUNCIONA EN WEB
XLSX.writeFile(wb, "reporte.xlsx");

}

// INICIO
cargar();

</script>
