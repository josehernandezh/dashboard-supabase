<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO Supabase</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Segoe UI;background:#f1f5f9;margin:0;}
.header{background:#0f172a;color:white;padding:20px;font-size:22px;}
.container{padding:25px;}
.cards{display:flex;gap:20px;margin-bottom:20px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.08);flex:1;}
.card span{font-size:28px;font-weight:bold;}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
input, select{padding:10px;border-radius:6px;border:1px solid #ccc;}
button{background:#2563eb;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<div class="header">Dashboard PRO (Supabase)</div>

<div class="container">

<div class="cards">
<div class="card">Registros<br><span id="total">0</span></div>
<div class="card">Cantidad Total<br><span id="suma">0</span></div>
</div>

<div class="controls">
<input id="buscar" placeholder="Buscar...">
<input type="date" id="inicio">
<input type="date" id="fin">

<select id="deviceFilter">
<option value="">Todos</option>
</select>

<button onclick="filtrar()">Filtrar</button>
<button onclick="exportExcel()">Excel</button>
</div>

<table id="tabla" class="display" style="width:100%"></table>

</div>

<script>

const URL = "https://glieqeycqkuseykmvcim.supabase.co/rest/v1/registros";
const API_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdsaWVxZXljcWt1c2V5a212Y2ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA3MzI4MjIsImV4cCI6MjA3NjMwODgyMn0.Ww-q6Iay68YHhuKJbg--FhsxjI_WkjghFFRaC2sgogU";

let tabla;
let dataGlobal = [];
let dataOriginal = [];

// FORMATO FECHA
function formatearFecha(fechaISO){
    if(!fechaISO) return "";
    let f = new Date(fechaISO);
    return f.toLocaleString("es-MX");
}

// 🔥 CARGAR DATOS (CORREGIDO)
async function cargar(){

try{

let todos = [];
let desde = 0;
let limite = 1000;
let maxIteraciones = 50; // 👈 evita loop infinito

for(let i=0; i<maxIteraciones; i++){

let res = await fetch(`${URL}?select=*&offset=${desde}&limit=${limite}`, {
    headers:{
        apikey:API_KEY,
        Authorization:"Bearer "+API_KEY
    }
});

// 🔴 validar respuesta
if(!res.ok){
    console.error("Error HTTP:", res.status);
    break;
}

let data = await res.json();

// 🔴 validar que sea array
if(!Array.isArray(data)){
    console.error("Respuesta inválida:", data);
    break;
}

if(data.length === 0) break;

todos = todos.concat(data);

desde += limite;

}

// 🔴 SI NO HAY DATOS
if(todos.length === 0){
    alert("No se pudieron cargar datos (revisa API KEY o Supabase)");
    return;
}

// guardar original
dataOriginal = todos;

// formatear
dataGlobal = todos.map(x => ({
    ...x,
    fecha_mx: formatearFecha(x.fecha)
}));

llenarFiltroEquipos();
cargarTabla(dataGlobal);
actualizarDashboard(dataGlobal);

}catch(e){
console.error("Error general:", e);
alert("Error cargando datos");
}

}

// TABLA
function cargarTabla(data){

if(tabla) tabla.destroy();

if(data.length === 0) return;

let columnas = Object.keys(data[0]);

tabla = $('#tabla').DataTable({
    data: data.map(x=>columnas.map(c=>x[c])),
    columns: columnas.map(c=>({title:c})),
    pageLength:25
});

}

// FILTRO EQUIPOS
function llenarFiltroEquipos(){

let select = document.getElementById("deviceFilter");
let actual = select.value;

select.innerHTML = '<option value="">Todos</option>';

let devices = [...new Set(dataOriginal.map(x=>x.device_id).filter(x=>x))];

devices.forEach(d=>{
    let opt = document.createElement("option");
    opt.value=d;
    opt.text=d;
    if(d === actual) opt.selected = true;
    select.appendChild(opt);
});

}

// DASHBOARD
function actualizarDashboard(data){

document.getElementById("total").innerText = data.length;

let suma = data.reduce((acc,x)=>acc + (parseFloat(x.cantidad)||0),0);
document.getElementById("suma").innerText = suma;

}

// FILTRAR
function filtrar(){

let inicio = document.getElementById("inicio").value;
let fin = document.getElementById("fin").value;
let device = document.getElementById("deviceFilter").value;

let filtrados = dataOriginal.filter(x=>{

let fecha = new Date(x.fecha);

if(device && x.device_id !== device) return false;

if(inicio && fecha < new Date(inicio)) return false;
if(fin && fecha > new Date(fin + "T23:59:59")) return false;

return true;

});

dataGlobal = filtrados.map(x=>({
    ...x,
    fecha_mx: formatearFecha(x.fecha)
}));

cargarTabla(dataGlobal);
actualizarDashboard(dataGlobal);

}

// BUSCAR
document.getElementById("buscar").addEventListener("keyup",function(){
if(tabla) tabla.search(this.value).draw();
});

// EXCEL (VERSIÓN ESTABLE)
// CAMBIAMOS EL NOMBRE PARA EVITAR CACHÉ
function descargarExcelPRO() {
    if (!dataGlobal || dataGlobal.length === 0) {
        alert("No hay datos");
        return;
    }

    try {
        // 1. Usamos la librería para generar solo los datos (NO el archivo)
        const ws = XLSX.utils.json_to_sheet(dataGlobal);
        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, "Datos");

        // 2. Generamos los bytes (USANDO write con 'array')
        const buffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });

        // 3. Creamos el archivo manualmente con un Blob
        const blob = new Blob([buffer], { type: "application/octet-stream" });
        const url = window.URL.createObjectURL(blob);
        
        const a = document.createElement("a");
        a.href = url;
        a.download = "reporte_" + Date.now() + ".xlsx";
        document.body.appendChild(a);
        a.click();
        
        // Limpieza
        window.URL.revokeObjectURL(url);
        document.body.removeChild(a);

    } catch (e) {
        console.error("Error:", e);
        alert("Fallo al exportar: " + e.message);
    }
}


// INICIO
cargar();

</script>
