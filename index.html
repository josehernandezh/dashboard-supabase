<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Dashboard PRO Supabase</title>

<link rel="stylesheet" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdn.datatables.net/1.13.6/js/jquery.dataTables.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
body{font-family:Segoe UI;background:#f1f5f9;margin:0;}
.header{background:#0f172a;color:white;padding:20px;font-size:22px;}
.container{padding:25px;}
.cards{display:flex;gap:20px;margin-bottom:20px;}
.card{background:white;padding:20px;border-radius:12px;box-shadow:0 10px 25px rgba(0,0,0,0.08);flex:1;}
.card span{font-size:28px;font-weight:bold;}
.controls{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
input, select{padding:10px;border-radius:6px;border:1px solid #ccc;}
button{background:#2563eb;color:white;border:none;padding:10px 15px;border-radius:6px;cursor:pointer;}
</style>
</head>

<body>

<div class="header">Dashboard PRO (Supabase)</div>

<div class="container">

<div class="cards">
<div class="card">Registros<br><span id="total">0</span></div>
<div class="card">Cantidad Total<br><span id="suma">0</span></div>
</div>

<div class="controls">
<input id="buscar" placeholder="Buscar...">
<input type="date" id="inicio">
<input type="date" id="fin">

<select id="deviceFilter">
<option value="">Todos</option>
</select>

<button onclick="filtrar()">Filtrar</button>
<button onclick="exportExcel()">Excel</button>
</div>

<table id="tabla" class="display" style="width:100%"></table>

</div>

<script>

const URL = "https://glieqeycqkuseykmvcim.supabase.co/rest/v1/registros";
const API_KEY = "TU_API_KEY";

let tabla;
let dataGlobal = [];
let dataOriginal = []; // 👈 datos sin tocar (para fechas reales)

// FORMATO MÉXICO
function formatearFecha(fechaISO){
let f = new Date(fechaISO);
return f.toLocaleString("es-MX");
}

// CARGAR DATOS
async function cargar(){

let todos = [];
let desde = 0;
let limite = 1000;

while(true){

let res = await fetch(`${URL}?select=*&offset=${desde}&limit=${limite}`, {
headers:{
apikey:API_KEY,
Authorization:"Bearer "+API_KEY
}
});

let data = await res.json();

if(!Array.isArray(data) || data.length === 0) break;

todos = todos.concat(data);
desde += limite;
}

// guardar original
dataOriginal = todos;

// formatear solo para mostrar
todos.forEach(x=>{
if(x.fecha){
x.fecha_mx = formatearFecha(x.fecha);
}
});

dataGlobal = todos;

llenarFiltroEquipos();
cargarTabla(todos);
actualizarDashboard(todos);

}

// TABLA
function cargarTabla(data){

if(tabla) tabla.destroy();

if(data.length === 0) return;

let columnas = Object.keys(data[0]);

tabla = $('#tabla').DataTable({
data: data.map(x=>columnas.map(c=>x[c])),
columns: columnas.map(c=>({title:c})),
pageLength:25
});

}

// FILTRO EQUIPOS
function llenarFiltroEquipos(){

let select = document.getElementById("deviceFilter");

let actual = select.value; // 👈 mantener selección

select.innerHTML = '<option value="">Todos</option>';

let devices = [...new Set(dataOriginal.map(x=>x.device_id).filter(x=>x))];

devices.forEach(d=>{
let opt = document.createElement("option");
opt.value=d;
opt.text=d;
if(d === actual) opt.selected = true;
select.appendChild(opt);
});

}

// DASHBOARD
function actualizarDashboard(data){

document.getElementById("total").innerText = data.length;

let suma = data.reduce((acc,x)=>acc + (parseFloat(x.cantidad)||0),0);
document.getElementById("suma").innerText = suma;

}

// FILTRAR
function filtrar(){

let inicio = document.getElementById("inicio").value;
let fin = document.getElementById("fin").value;
let device = document.getElementById("deviceFilter").value;

let filtrados = dataOriginal.filter(x=>{

let fecha = new Date(x.fecha);

if(device && x.device_id !== device) return false;

if(inicio && fecha < new Date(inicio)) return false;
if(fin && fecha > new Date(fin + "T23:59:59")) return false;

return true;

});

// volver a formatear
filtrados = filtrados.map(x=>{
return {...x, fecha_mx: formatearFecha(x.fecha)};
});

dataGlobal = filtrados;

cargarTabla(filtrados);
actualizarDashboard(filtrados);

}

// BUSCAR
document.getElementById("buscar").addEventListener("keyup",function(){
if(tabla) tabla.search(this.value).draw();
});

// EXPORTAR EXCEL (100% FUNCIONAL)
function exportExcel(){

if(!dataGlobal.length){
alert("No hay datos");
return;
}

let columnas = Object.keys(dataGlobal[0]);

let filas = dataGlobal.map(x => columnas.map(c => x[c]));

let ws = XLSX.utils.aoa_to_sheet([columnas, ...filas]);
let wb = XLSX.utils.book_new();
XLSX.utils.book_append_sheet(wb, ws, "Datos");

// 👇 MÉTODO QUE SÍ FUNCIONA EN WEB / GITHUB / ANDROID
let wbout = XLSX.write(wb, {bookType:'xlsx', type:'array'});
let blob = new Blob([wbout], {type:"application/octet-stream"});

let url = URL.createObjectURL(blob);
let a = document.createElement("a");
a.href = url;
a.download = "reporte.xlsx";
document.body.appendChild(a);
a.click();
document.body.removeChild(a);

}

// INICIO
cargar();

</script>

</body>
</html>
